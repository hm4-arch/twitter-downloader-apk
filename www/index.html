<!DOCTYPE html>

<html>

<head>

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Twitter Downloader
</title>

</head>

<body
style="
background:#111;
color:white;
text-align:center;
padding:30px;
font-family:sans-serif;
"
>

<h1>

Twitter Downloader

</h1>

<img
src="vaca.gif"
width="220"
>

<br><br>

<input
placeholder="https://x.com/usuario"
style="
width:90%;
height:45px;
"
>

<br><br>

<button
style="
width:220px;
height:50px;
"
>

<input id="url" placeholder="https://x.com/usuario">

<button onclick="descargar()">
DESCARGAR
</button>

<script>
async function descargar() {
    const url =
        document.getElementById("url").value;

    if (!url) {
        alert("Pegá una URL");
        return;
    }

    alert("Descarga iniciada:\n" + url);

fetch("http://127.0.0.1:5000/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url:url
})
})
.then(r=>r.text())
.then(alert)
.catch(console.error);
